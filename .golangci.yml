version: "2"

run:
  timeout: 5m

linters:
  # Enable the full set, then switch off the few that fight idiomatic CLI code.
  default: all
  disable:
    - exhaustruct      # we intentionally build partial structs (API models, cobra cmds)
    - wsl             # opinionated whitespace rules
    - wsl_v5
    - nlreturn        # forced blank line before return
    - varnamelen      # short receiver/loop names are fine
    - gochecknoglobals # version var and cobra patterns use package globals
    - gochecknoinits
    - depguard        # no import allowlist policy needed
    - godox           # TODO/FIXME comments are allowed
    - ireturn         # returning interfaces is fine here
    - gomodguard      # deprecated alias; superseded by gomodguard_v2 below
    - noinlineerr     # `if err := f(); err != nil` is idiomatic Go
    - wrapcheck       # errors are wrapped with context where it matters (client/config)
    - funcorder       # method declaration ordering is cosmetic

  settings:
    lll:
      line-length: 140
    funlen:
      lines: 120
      statements: 70
    cyclop:
      max-complexity: 20
    gocognit:
      min-complexity: 30
    gocyclo:
      min-complexity: 20
    exhaustive:
      default-signifies-exhaustive: true
    errcheck:
      # Writes to stdout/stderr in a CLI are not actionable on failure.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln

  exclusions:
    rules:
      # The cmd/ layer is a CLI: it prints to stdout by design (forbidigo) and
      # returns one-shot, user-facing validation errors never compared with
      # errors.Is (err113). Keep both strict everywhere else.
      - path: (^|/)cmd/
        linters:
          - forbidigo
          - err113
      # DTO structs mirror external JSON we do not control: the Darkube API
      # (snake_case, acronyms like enable_SSL) and the k8s remotecommand resize
      # payload ({"Width","Height"}).
      - path: (^|/)internal/(client|wsexec|appstate)/
        linters:
          - tagliatelle
      # Test files legitimately repeat small string literals (fixture keys).
      - path: _test\.go
        linters:
          - goconst

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
